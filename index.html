<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ahmed Noui</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #1e1e2e;
      --accent: #6c63ff;
      --accent-glow: rgba(108, 99, 255, 0.18);
      --accent2: #00d4aa;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --card-hover: #16162a;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 48px 20px 64px;
    }

    /* Ambient background blobs */
    body::before {
      content: '';
      position: fixed;
      top: -120px;
      left: 50%;
      transform: translateX(-50%);
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(108,99,255,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -80px;
      right: -60px;
      width: 320px;
      height: 320px;
      background: radial-gradient(circle, rgba(0,212,170,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ── Avatar ── */
    .avatar-wrap {
      position: relative;
      margin-bottom: 24px;
    }

    .avatar-ring {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      padding: 2px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .avatar-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Mono', monospace;
      font-size: 28px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -1px;
    }

    /* ── Header text ── */
    .name {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      text-align: center;
      line-height: 1.1;
    }

    .role-line {
      margin-top: 8px;
      text-align: center;
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      color: var(--accent2);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .bio {
      margin-top: 14px;
      text-align: center;
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.6;
      max-width: 300px;
    }

    /* ── Divider ── */
    .divider {
      width: 100%;
      height: 1px;
      background: var(--border);
      margin: 28px 0 24px;
    }

    /* ── Link cards ── */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      border-radius: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      text-decoration: none;
      color: var(--text);
      transition: background 0.2s, border-color 0.2s, transform 0.18s;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .link-card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    .link-card.portfolio::before { background: radial-gradient(circle at 0% 50%, rgba(108,99,255,0.12), transparent 60%); }
    .link-card.github::before   { background: radial-gradient(circle at 0% 50%, rgba(240,246,252,0.06), transparent 60%); }
    .link-card.linkedin::before { background: radial-gradient(circle at 0% 50%, rgba(0,119,181,0.12), transparent 60%); }

    .link-card:hover {
      background: var(--card-hover);
      transform: translateY(-2px);
    }

    .link-card:hover::before { opacity: 1; }

    .link-card.portfolio:hover { border-color: var(--accent); }
    .link-card.github:hover    { border-color: #6e7681; }
    .link-card.linkedin:hover  { border-color: #0077b5; }

    /* Icon box */
    .icon-box {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .link-card.portfolio .icon-box { background: rgba(108,99,255,0.15); }
    .link-card.github .icon-box    { background: rgba(255,255,255,0.06); }
    .link-card.linkedin .icon-box  { background: rgba(0,119,181,0.15); }

    .icon-box svg {
      width: 22px;
      height: 22px;
    }

    .link-card.portfolio .icon-box svg { color: var(--accent); }
    .link-card.github .icon-box svg    { color: #e8e8f0; }
    .link-card.linkedin .icon-box svg  { color: #0a97d9; }

    /* Text in card */
    .card-text { flex: 1; min-width: 0; }
    .card-label {
      font-size: 0.95rem;
      font-weight: 600;
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-sub {
      font-size: 0.75rem;
      color: var(--muted);
      display: block;
      margin-top: 2px;
      font-family: 'Space Mono', monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Arrow */
    .arrow {
      color: var(--muted);
      flex-shrink: 0;
      transition: color 0.2s, transform 0.2s;
    }
    .link-card:hover .arrow {
      color: var(--text);
      transform: translateX(3px);
    }

    /* ── Footer ── */
    .footer {
      margin-top: 40px;
      text-align: center;
      font-size: 0.72rem;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.04em;
    }

    .footer span {
      color: var(--accent);
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .link-card, .link-card::before, .arrow { transition: none; }
      .link-card:hover { transform: none; }
    }
  </style>
</head>
<body>

  </div>
</body>
</html>
